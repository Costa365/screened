services:
  screened:
    build: .
    ports:
      - "8082:8000"
    volumes:
      - ./data:/app/data
    environment:
      - TMDB_API_KEY=${TMDB_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=sqlite:////app/data/screened.db
      - VIRTUAL_HOST=screened.costa365.site
      - PORT=8082
    networks:
      - default
    restart: unless-stopped

networks:
  default:
    external: true
    name: nginx-proxy
